<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knowify Projects</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117; color: #c9d1d9;
  padding: 28px 32px; font-size: 13px;
}
h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; margin-bottom: 4px; }
.meta { color: #484f58; font-size: 12px; margin-bottom: 16px; }

/* Filter bar */
.filters { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-group { display: flex; gap: 5px; align-items: center; }
.filter-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #484f58; margin-right: 4px; }
.filter-btn {
  font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 10px;
  border: 1px solid #30363d; background: #161b22; color: #6e7681;
  cursor: pointer; transition: all 0.1s;
}
.filter-btn:hover { border-color: #484f58; color: #c9d1d9; }
.filter-btn.active { border-color: #58a6ff; background: #0c2d6b; color: #79c0ff; }

/* Legend */
.legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; margin-top: 4px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6e7681; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.l-active  { background: #7c3aed; }
.l-pending { background: #30363d; }
.l-closed  { background: #238636; }

/* Table */
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: #484f58;
  padding: 0 14px 10px 14px; text-align: left;
  border-bottom: 1px solid #21262d;
  position: sticky; top: 0; background: #0d1117; z-index: 10;
  cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { color: #8b949e; }
thead th.sort-asc::after  { content: ' ↑'; color: #58a6ff; }
thead th.sort-desc::after { content: ' ↓'; color: #58a6ff; }

tbody tr { border-bottom: 1px solid #161b22; vertical-align: top; }
tbody tr:last-child { border-bottom: none; }
tbody tr.group-start td { border-top: 1px solid #21262d; }
td { padding: 10px 14px; }
.no-results { text-align: center; color: #484f58; padding: 40px; font-size: 13px; }

/* Project column */
.col-project { width: 230px; }
.project-name { font-weight: 600; color: #e6edf3; font-size: 13px; line-height: 1.4; text-decoration: none; }
.project-name:hover { color: #58a6ff; }
.project-client { font-size: 11px; color: #484f58; margin-top: 2px; }
.project-badges { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.03em; }
.badge-active  { background: #1a3d2b; color: #6fcf97; border: 1px solid #27ae60; }
.badge-closed  { background: #161b22; color: #6e7681; border: 1px solid #30363d; }
.badge-ofs     { background: #1a1060; color: #a78bfa; border: 1px solid #7c3aed; }
.badge-bidding { background: #1a2a1a; color: #4ade80; border: 1px solid #166534; }
.badge-lead    { background: #1e2a3a; color: #60a5fa; border: 1px solid #1d4ed8; }
.badge-p1   { background: #3b0a0a; color: #f87171; border: 1px solid #b91c1c; }
.badge-p2   { background: #3b1a06; color: #fb923c; border: 1px solid #c2410c; }
.badge-p3   { background: #3b2e06; color: #fbbf24; border: 1px solid #b45309; }
.badge-p4   { background: #0a2e14; color: #4ade80; border: 1px solid #166534; }
.badge-opp  { background: #0c1e4a; color: #60a5fa; border: 1px solid #1d4ed8; }
.badge-qtr  { background: #1c2128; color: #6e7681; border: 1px solid #30363d; }
.badge-warn { background: #3d1f02; color: #f0883e; border: 1px solid #9e4e00; }

/* Phases column */
.col-phases { min-width: 340px; }
.phases-wrap { display: flex; flex-wrap: wrap; gap: 4px; overflow: visible; }
.phase-pill {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  white-space: nowrap; max-width: 200px; overflow: hidden;
  text-overflow: ellipsis; display: inline-block;
  text-decoration: none; cursor: pointer;
}
.phase-pill.has-tooltip { overflow: visible; }
.ph-Active  { background: #2d1657; color: #c084fc; border: 1px solid #7c3aed55; }
.ph-Pending { background: #161b22; color: #484f58;  border: 1px solid #21262d; }
.ph-Closed  { background: #0d1f16; color: #3fb950;  border: 1px solid #23863644; }
.ph-Closed-warn { background: #1f1200; color: #e3b341; border: 1px solid #9e6a0066; }

.pill-count {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 9px; font-weight: 700;
  padding: 0 4px; min-width: 14px; height: 14px;
  vertical-align: middle; margin-left: 1px;
}
.pill-count-grey    { background: #2d333b; color: #6e7681; }
.pill-count-normal  { background: rgba(255,255,255,0.15); color: inherit; }
.pill-count-soon    { background: #78350f; color: #fbbf24; }
.pill-count-overdue { background: #7f1d1d; color: #f87171; }

/* Tooltip */
.has-tooltip { position: relative; cursor: default; }
.has-tooltip .tip {
  visibility: hidden; opacity: 0;
  position: absolute; z-index: 200;
  left: 0; top: calc(100% + 6px);
  background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; padding: 12px 14px;
  min-width: 260px; max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  text-align: left; transition: opacity 0.15s; pointer-events: none;
  white-space: normal;
}
.has-tooltip:hover .tip { visibility: visible; opacity: 1; }
.tip-title { font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.tip-task { padding: 5px 0; border-bottom: 1px solid #21262d; }
.tip-task:last-child { border-bottom: none; }
.tip-task-name { font-size: 12px; color: #e6edf3; line-height: 1.4; margin-bottom: 3px; }
.tip-task-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.tip-meta { font-size: 10px; color: #6e7681; display: flex; align-items: center; gap: 3px; }
.tip-meta.overdue { color: #f85149; }
.tip-meta.soon    { color: #e3b341; }
</style>
</head>

// Derive all unique priorities and quarters from tags
const allPriorities = new Set();
const allQuarters = new Set();
DATA.forEach(p => {
  p.tags.flatMap(t => t.split(',').map(s => s.trim())).forEach(t => {
    if (PRIORITY_ORDER.includes(t.toLowerCase())) allPriorities.add(t.toLowerCase());
    else if (t) allQuarters.add(t);
  });
});

// Populate dynamic filter buttons
['priority','quarter'].forEach(type => {
  const container = document.getElementById(`${type}-filters`);
  const vals = type === 'priority'
    ? PRIORITY_ORDER.filter(p => allPriorities.has(p))
    : [...allQuarters].sort();
  vals.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = type;
    btn.dataset.value = v;
    btn.textContent = v;
    container.appendChild(btn);
  });
});

// Filter state
const filters = { status: '', priority: '', quarter: '' };
let sortCol = 'default';
let sortDir = 'asc';

function parseTags(rawTags) {
  return rawTags.flatMap(t => t.split(',').map(s => s.trim())).filter(Boolean);
}

function getPriority(proj) {
  const tags = parseTags(proj.tags);
  for (const p of PRIORITY_ORDER) {
    if (tags.map(t => t.toLowerCase()).includes(p)) return p;
  }
  return null;
}

function getQuarter(proj) {
  const tags = parseTags(proj.tags);
  return tags.find(t => !PRIORITY_ORDER.includes(t.toLowerCase())) || null;
}

function fmtDeadline(d) {
  if (!d) return null;
  const date = new Date(d.substring(0,10) + 'T12:00:00');
  const diff = Math.round((date - TODAY) / 86400000);
  const label = date.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  if (diff < 0)  return {label, cls:'overdue', note:`${Math.abs(diff)}d overdue`};
  if (diff <= 7) return {label, cls:'soon',    note:`in ${diff}d`};
  return {label, cls:'', note:''};
}

function pillCountClass(ph) {
  if (!ph.tasks.some(t => t.deadline)) return 'pill-count-grey';
  for (const t of ph.tasks) {
    const dl = fmtDeadline(t.deadline);
    if (dl && dl.cls === 'overdue') return 'pill-count-overdue';
  }
  for (const t of ph.tasks) {
    const dl = fmtDeadline(t.deadline);
    if (dl && dl.cls === 'soon') return 'pill-count-soon';
  }
  return 'pill-count-normal';
}

function renderPhaseTip(ph) {
  if (!ph.open_count) return '';
  const isClosed = ph.state === 'Closed';
  let html = `<div class="tip-title">${ph.name}${isClosed ? ' &mdash; phase closed' : ''}</div>`;
  for (const t of ph.tasks) {
    const dl = fmtDeadline(t.deadline);
    html += `<div class="tip-task"><div class="tip-task-name">${t.description}</div>
      <div class="tip-task-meta">`;
    if (dl) {
      html += `<span class="tip-meta ${dl.cls}">&#128197; ${dl.label}${dl.note ? ' &middot; '+dl.note : ''}</span>`;
    } else {
      html += `<span class="tip-meta">No due date</span>`;
    }
    if (t.assignees.length) {
      html += `<span class="tip-meta">&#128100; ${t.assignees.map(a=>a.split(' ')[0]).join(', ')}</span>`;
    }
    html += `</div></div>`;
  }
  return html;
}

function phasePillClass(ph) {
  if (ph.state === 'Closed' && ph.open_count > 0) return 'ph-Closed-warn';
  return `ph-${ph.state}`;
}

function renderTags(rawTags) {
  const all = parseTags(rawTags);
  const priority = all.filter(t => PRIORITY_ORDER.includes(t.toLowerCase()));
  const quarters = all.filter(t => !PRIORITY_ORDER.includes(t.toLowerCase()));
  priority.sort((a,b) => PRIORITY_ORDER.indexOf(a.toLowerCase()) - PRIORITY_ORDER.indexOf(b.toLowerCase()));
  return [
    ...priority.map(t => `<span class="badge ${PRIORITY_CLASS[t.toLowerCase()]}">${t}</span>`),
    ...quarters.map(t => `<span class="badge badge-qtr">${t}</span>`)
  ].join('');
}

function getFiltered() {
  return DATA.filter(p => {
    if (filters.status && p.state !== filters.status) return false;
    if (filters.priority) {
      const tags = parseTags(p.tags).map(t => t.toLowerCase());
      if (!tags.includes(filters.priority)) return false;
    }
    if (filters.quarter) {
      const tags = parseTags(p.tags);
      if (!tags.some(t => t === filters.quarter)) return false;
    }
    return true;
  });
}

function getSorted(list) {
  return [...list].sort((a, b) => {
    let va, vb;
    if (sortCol === 'name') {
      va = a.name.toLowerCase(); vb = b.name.toLowerCase();
    } else if (sortCol === 'tasks') {
      va = a.phases.reduce((s,p) => s + p.open_count, 0);
      vb = b.phases.reduce((s,p) => s + p.open_count, 0);
    } else {
      // default: active first, then by open task count desc
      if (a.state !== b.state) return a.state === 'Open' ? -1 : 1;
      const at = a.phases.reduce((s,p) => s+p.open_count, 0);
      const bt = b.phases.reduce((s,p) => s+p.open_count, 0);
      return bt - at;
    }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function render() {
  const tbody = document.getElementById('tbody');
  const list = getSorted(getFiltered());

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="2" class="no-results">No projects match the current filters.</td></tr>`;
    return;
  }

  let html = '';
  let lastGroup = null;

  list.forEach(proj => {
    const group = proj.name.match(/^([A-Z]+\d+)/)?.[1] || proj.name;
    const isGroupStart = group !== lastGroup;
    lastGroup = group;

    const totalOpen = proj.phases.reduce((s,p) => s + p.open_count, 0);
    const knowUrl = `https://secure.knowify.com/#/projects/details/summary/${proj.id}`;
    const STATE_BADGE = {
      'Active': ['badge-active','Active'],
      'Out for signature': ['badge-ofs','Out for sig'],
      'Bidding': ['badge-bidding','Bidding'],
      'Lead': ['badge-lead','Lead'],
      'Closed': ['badge-closed','Closed'],
    };
    const [stateClass, stateLabel] = STATE_BADGE[proj.state] || ['badge-closed', proj.state];

    html += `<tr${isGroupStart ? ' class="group-start"' : ''}>`;

    // Project cell
    html += `<td class="col-project">
      <a class="project-name" href="${knowUrl}" target="_blank">${proj.name}</a>
      <div class="project-client">${proj.client}</div>
      <div class="project-badges">
        <span class="badge ${stateClass}">${stateLabel}</span>
        ${renderTags(proj.tags)}
        ${proj.requires_attention === 'ProposalNotOpened' ? '<span class="badge badge-warn">Proposal Not Opened</span>' : ''}
        ${proj.state === 'Closed' && proj.date_closed ? `<span style="font-size:10px;color:#484f58">closed ${proj.date_closed}</span>` : ''}
      </div>
    </td>`;

    // Phases cell
    const planUrl = `https://secure.knowify.com/#/projects/details/plan/${proj.id}`;
    const pillsHtml = proj.phases.map(ph => {
      const cls = phasePillClass(ph);
      const tip = renderPhaseTip(ph);
      const label = ph.name.length > 26 ? ph.name.slice(0,24) + '\u2026' : ph.name;
      if (tip) {
        const countCls = pillCountClass(ph);
        return `<a class="phase-pill ${cls} has-tooltip" href="${planUrl}" target="_blank">${label} <span class="pill-count ${countCls}">${ph.open_count}</span><div class="tip">${tip}</div></a>`;
      }
      return `<a class="phase-pill ${cls}" href="${planUrl}" target="_blank" title="${ph.name.replace(/"/g,'&quot;')}">${label}</a>`;
    }).join('');

    html += `<td class="col-phases"><div class="phases-wrap">${pillsHtml}</div></td>`;
    html += '</tr>';
  });

  tbody.innerHTML = html;
}

// Sort handlers
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    render();
  });
});

// Filter handlers
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.filter;
    const val = btn.dataset.value;
    filters[type] = val;
    document.querySelectorAll(`.filter-btn[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
</script>
